apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-config
  namespace: default
data:
  # Frontend 설정
  # API_URL: 브라우저가 사용할 상대 경로
  API_URL: "/api"
  
  # BACKEND_HOST: Frontend Nginx가 Backend ClusterIP Service로 직접 프록시
  # Stable Service 사용 (향후 Argo Rollouts 전환 가능)
  BACKEND_HOST: "inventory-backend-stable:8000"
  
  # Backend Redis 설정
  REDIS_HOST: "inventory-redis"
  REDIS_PORT: "6379"
  USE_REDIS: "true"
