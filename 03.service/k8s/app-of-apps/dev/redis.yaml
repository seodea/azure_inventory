---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-redis
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-redis
  template:
    metadata:
      labels:
        app: inventory-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: inventory-redis
  namespace: default
spec:
  selector:
    app: inventory-redis
  ports:
  - port: 6379
    targetPort: 6379

---
# Redis PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
