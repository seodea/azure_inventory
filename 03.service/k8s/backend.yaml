---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-backend
  template:
    metadata:
      labels:
        app: inventory-backend
    spec:
      containers:
      - name: backend
        image: wotnek90/inventory:backend-v3
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: inventory-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: inventory-config
              key: REDIS_PORT
        - name: USE_REDIS
          valueFrom:
            configMapKeyRef:
              name: inventory-config
              key: USE_REDIS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
# Backend Service (Stable)
# 향후 Argo Rollouts 도입 시 stable/canary 분리 가능
apiVersion: v1
kind: Service
metadata:
  name: inventory-backend-stable
  namespace: default
  labels:
    app: inventory-backend
    version: stable
spec:
  selector:
    app: inventory-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
